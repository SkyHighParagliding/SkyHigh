    - generic [ref=e465]:
      - generic [ref=e479]:
        - generic [ref=e480]: I'm a PG2 pilot, what sites can I fly next Tuesday?
        - img [ref=e481]
      - generic [ref=e484]:
        - img [ref=e485]
        - generic [ref=e488]:
          - generic [ref=e489]:
            - text: As a PG2 pilot, you require on-site supervision by an Instructor, Safety Officer, Duty Pilot, or a supervising pilot (PG4 or Intermediate HG pilot with a minimum of 50 hours flight experience, PG5 or Advanced HG) at
            - emphasis [ref=e490]: every
            - text: site. This is a mandatory safety rule for all PG2 pilots.
          - generic [ref=e491]: "Based on the forecast for next Tuesday (May 27th, 2026), here are the sites with flyable conditions where a PG2 pilot can fly under supervision:"
          - generic [ref=e492]:
            - emphasis
            - emphasis [ref=e493]: Barwon Heads (13th Beach)
            - text: "* [PG2 Supervised] - This coastal site has wind from the S-SW and a speed range of 10-14 knots. Remember, don't walk or kite up the dunes and give Hooded Plover nest sites plenty of room."
          - generic [ref=e494]:
            - emphasis
            - emphasis [ref=e495]: Bells Beach - Southside
            - text: "* [PG2 Supervised] - This is a popular coastal site with S-E winds at 5-12 knots. Be aware that the beach can be very small at high tide or high surf, so always consider your landing options."
          - generic [ref=e496]:
            - emphasis
            - emphasis [ref=e497]: Ben More
            - text: "* [PG2 Supervised] - An inland ridge site with SW winds at 4-8 knots. Your first flights here must be under the supervision of a Western Vic club member to learn site protocols."
          - generic [ref=e498]:
            - emphasis
            - emphasis [ref=e499]: Gordon
            - text: "* [PG2 Supervised] - This is a rounded, grassy volcanic hill with easy open take-off and landing. Winds are S, SE, ESE at 5-8 knots. Keep a good lookout for light aircraft in the flight path between Melbourne and Ballarat."
          - generic [ref=e500]:
            - emphasis
            - emphasis [ref=e501]: Kilcunda
            - text: "* [PG2 Supervised] - This coastal dune site has S-SW winds at 10-14 knots and is suitable for student-rated pilots upwards. Be mindful of people and fishing equipment on the beach when landing."
          - generic [ref=e502]:
            - emphasis
            - emphasis [ref=e503]: Logans Beach
            - text: "* [PG2 Supervised] - This coastal dune site has SSW-SW winds at 8-16 knots. Be aware of whales and tourist aircraft during the winter months (July-September)."
          - generic [ref=e504]:
            - emphasis
            - emphasis [ref=e505]: Marriners Lookout
            - text: "* [PG2 Supervised] - A large grassy coastal hill with SE winds at 5-8 knots. A daily per-pilot launch fee of $9.50 is required, and you must sign a waiver form before flying."
          - generic [ref=e506]:
            - emphasis
            - emphasis [ref=e507]: Portsea
            - text: "* [PG2 Supervised] - Located within the Mornington Peninsula National Park, this site has S-SW winds at 10-14 knots. Take off cleanly from the ramp, land on the beach, and return via the main access track."
          - generic [ref=e508]: Always check the individual site pages for the full live view and 6-hour forecast before you head out, and remember to coordinate with your supervisor!
          - strong [ref=e510]: General information only. Consult SAFA/CASA docs and Site Rules.
