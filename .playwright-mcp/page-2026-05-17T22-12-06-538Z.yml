- generic [ref=e2]: "{\"data\":[{\"id\":\"arthurs-seat\",\"name\":\"Arthurs Seat\",\"type\":\"Coastal\",\"windDir\":\"W-NW\",\"windSpeed\":\"8-16\",\"status\":\"closed\",\"hazardLevel\":\"low\",\"lat\":-38.353,\"lon\":144.951,\"description\":\"Make sure conditions are perfect before flying here, otherwise you may not make the beach. Only high performance gliders should be flown here. The flight out towards the landing area is not as hard as it looks, a Westerly wind is cross to your line of flight, rather than a headwind. If conditions are good, expect to lose around 500' on the way out and arrive over Dromana township with around 1000'.\",\"launch\":\"A sheer rock ledge with a natural set up area. Wire assist is required. If the mountain is 'on', invariably the launch is crossed.\",\"landing\":\"There is no bombout, the nearest landing is Dromana Beach approx 1.5km. The beach is not very wide, particularly at high tide. However there are wider sections further along toward the lighthouse.\",\"hazards\":[\"No close landing area.\"],\"rules\":[],\"image\":\"\",\"useLiveWeather\":\"false\",\"liveStationId\":null,\"liveStationIdAlt\":null,\"siteguideUrl\":\"https://siteguide.org.au/Sites/Details/Arthurs%20Seat\",\"siteContact\":null,\"siteContactPhone\":null,\"navigateTo\":\"https://www.google.com/maps/dir//'S38.35300,E144.95100'\",\"launchHeight\":\"547m / 1795'\",\"launchHeightHigh\":\"259m / 850'\",\"hoodedPloversLink\":null,\"hoodedPloversActive\":\"false\",\"emergencyMarker\":null,\"what3words\":null,\"weatherStationLink\":null,\"weatherGaugeUrl\":null,\"crossLeft\":\"false\",\"crossRight\":\"false\",\"isSkyHighSite\":\"true\",\"pgRating\":\"Not suitable\",\"hgRating\":\"HG Advanced\",\"overrideHideClosed\":\"false\",\"essentialInfoImages\":\"[]\",\"essentialInfoText\":\"Takeoff: A sheer rock ledge with a natural set up area. Wire assist is required. If the mountain is 'on', invariably the launch is crossed.\\n\\nLanding: There is no bombout, the nearest landing is Dromana Beach approx 1.5km. The beach is not very wide, particularly at high tide. However there are wider sections further along toward the lighthouse.\\n\\nFlight: Make sure conditions are perfect before flying here, otherwise you may not make the beach. Only high performance gliders should be flown here.\\n\\nHazards / Comments: No close landing area. The flight out towards the landing area is not as hard as it looks, a Westerly wind is cross to your line of flight, rather than a headwind. If conditions are good, expect to lose around 500' on the way out and arrive over Dromana township with around 1000'.\",\"unassignedText\":\"\",\"siteguideVersion\":\"v857\",\"siteguideScrapedAt\":\"2026-05-17T12:15:45.157Z\",\"contentHash\":\"3f7674b76efef0123fd98bc31a5755fabdb38242156be35c311e54c08246b609\",\"temporarilyClosed\":0,\"preClosureOverrideHideClosed\":null,\"isTidal\":\"false\",\"tideStationId\":null,\"skipBulkImport\":\"false\",\"isXCSite\":\"false\",\"launchHeight2\":null,\"landingHeight2\":null,\"heroImages\":\"[]\",\"displayOnMap\":1,\"displayInList\":1},{\"id\":\"barwon-heads-13th-beach\",\"name\":\"Barwon Heads (13th Beach)\",\"type\":\"Coastal\",\"windDir\":\"S-SW\",\"windSpeed\":\"10-14\",\"status\":\"open\",\"hazardLevel\":\"low\",\"lat\":-38.28133,\"lon\":144.4391,\"description\":\"This is a sensitive site. Do not walk through the dunes and do not kite up the dunes. As always, give marked Hooded Plover nest sites plenty of room. Consider flying Ocean Grove or elsewhere instead to reduce traffic at this site. Beach nesting birds: Hooded Plovers nest in this area. Visit this page to learn more. NOTICE - 13th Beach, Barwon Heads - Limited Access Until further notice hang gliding operations at 13th beach are restricted to the 40W location. Addtionally, set up and launching are limited to one aircraft at any time. Top landing at 13th beach is banned except at the launch site at 40W. Negotiations are currently in progress with Barwon Coast, the responsible authority, to develop a substainable facility.\",\"launch\":\"Hang gliders set up and take off on the grass patch left of the access path at the westmost carpark (40W). Paragliders take off from the beach at 32W or 30W. There is no PG top launch.\",\"landing\":\"Anywhere on the beach. Hang gliders can top land on launch only. If possible, pack up hang gliders on the beach to reduce impact on launch vegetation.\",\"hazards\":[\"Like all small dune sites this requires excellent ground handling skills for paragliders and good close flying skills for HG and PG.\"],\"rules\":[\"Do not walk through the dunes.\",\"Do not kite up the dunes.\",\"Give marked Hooded Plover nest sites plenty of room.\",\"Hang gliding operations at 13th beach are restricted to the 40W location.\",\"Set up and launching are limited to one aircraft at any time (HG).\",\"Top landing at 13th beach is banned except at the launch site at 40W.\",\"If possible, pack up hang gliders on the beach to reduce impact on launch vegetation.\"],\"image\":\"\",\"useLiveWeather\":\"false\",\"liveStationId\":null,\"liveStationIdAlt\":null,\"siteguideUrl\":\"https://siteguide.org.au/Sites/Details/Barwon%20Heads%20(13th%20Beach)\",\"siteContact\":\"Dynasoarers, Rob van der Klooster, Jan Bennewitz\",\"siteContactPhone\":\"0408 335 559, 0423 139 923\",\"navigateTo\":\"https://www.google.com/maps/dir//'S38.28133,E144.43910'\",\"launchHeight\":null,\"launchHeightHigh\":null,\"hoodedPloversLink\":null,\"hoodedPloversActive\":\"false\",\"emergencyMarker\":null,\"what3words\":null,\"weatherStationLink\":null,\"weatherGaugeUrl\":null,\"crossLeft\":\"false\",\"crossRight\":\"false\",\"isSkyHighSite\":\"false\",\"pgRating\":\"PG2 Supervised\",\"hgRating\":\"HG Supervised\",\"overrideHideClosed\":\"false\",\"essentialInfoImages\":\"[]\",\"essentialInfoText\":\"Takeoff: Hang gliders set up and take off on the grass patch left of the access path at the westmost carpark (40W). Paragliders take off from the beach at 32W or 30W. There is no PG top launch.\\n\\nLanding: Anywhere on the beach. Hang gliders can top land on launch only. If possible, pack up hang gliders on the beach to reduce impact on launch vegetation.\\n\\nHazards / Comments: Like all small dune sites this requires excellent ground handling skills for paragliders and good close flying skills for HG and PG.\",\"unassignedText\":\"\",\"siteguideVersion\":\"v857\",\"siteguideScrapedAt\":\"2026-05-17T12:15:45.157Z\",\"contentHash\":\"eed920dc0575833eb447bc91b8a47ae2123f2a6a6f06bb126e416c72cf4243a0\",\"temporarilyClosed\":0,\"preClosureOverrideHideClosed\":null,\"isTidal\":\"false\",\"tideStationId\":null,\"skipBulkImport\":\"false\",\"isXCSite\":\"false\",\"launchHeight2\":null,\"landingHeight2\":null,\"heroImages\":\"[]\",\"displayOnMap\":1,\"displayInList\":1},{\"id\":\"bells-beach\",\"name\":\"Bells Beach - Southside\",\"type\":\"Coastal\",\"windDir\":\"S-E\",\"windSpeed\":\"5-12\",\"status\":\"open\",\"hazardLevel\":\"low\",\"lat\":-38.37496,\"lon\":144.26933,\"description\":\"One of the most popular West Coast sites for paragliders. Beautiful, varied coastline with a sizable flyable stretch in the right conditions. Flights to Jan Juc to the NE, and Anglesea and beyond to the SW are possible in the right conditions. See also the Winkipop launch entry for information on the coast run.\",\"launch\":\"Jarosite (E-SE) 75m / 250ft asl. Rated HG Supervised/PG2. To get to this launch, drive west past the Southside carpark turnoff for about 400 m until you see a dirt turnout with a walking track. Follow the track until you come to a meeting of five tracks. Take the leftmost one to launch. It's a fair way if you're carrying a hang glider.\\nSouthside (SE-SSW) 35m / 120ft asl. Rated PG2, recommended PG only. Park at Southside carpark and take the track at the end of the carpark. Setup and launch from the astroturf area only. Due to rotor from the cliff edge, this takeoff can be tricky for hang gliders.\",\"landing\":\"Top land on Southside or land on the beach below. Beware, in a high tide/high surf, this beach can get too small to safely land. Always consider your landing options.\",\"hazards\":[\"Due to rotor from the cliff edge, this takeoff can be tricky for hang gliders.\",\"in a high tide/high surf, this beach can get too small to safely land.\"],\"rules\":[],\"image\":\"\",\"useLiveWeather\":\"true\",\"liveStationId\":\"IJANJU1\",\"liveStationIdAlt\":null,\"siteguideUrl\":\"https://siteguide.org.au/Sites/Details/Bells%20Beach\",\"siteContact\":\"Dynasoarers, Rob van der Klooster, Peter Hannah, Jan Bennewitz\",\"siteContactPhone\":\"0408 335 559\",\"navigateTo\":\"https://www.google.com/maps/dir//'S38.37496,E144.26934'\",\"launchHeight\":\"103m / 338'\",\"launchHeightHigh\":\"35m / 115'\",\"hoodedPloversLink\":null,\"hoodedPloversActive\":\"false\",\"emergencyMarker\":null,\"what3words\":null,\"weatherStationLink\":null,\"weatherGaugeUrl\":null,\"crossLeft\":\"false\",\"crossRight\":\"false\",\"isSkyHighSite\":\"false\",\"pgRating\":\"PG2 Supervised\",\"hgRating\":\"HG Supervised\",\"overrideHideClosed\":\"false\",\"essentialInfoImages\":\"[\\\"https://pub-971a295c84fe4582b888c39e86cdbd8c.r2.dev/images/essential/essential-bells-beach-1.png\\\"]\",\"essentialInfoText\":\"Takeoff: Jarosite (E-SE) 75m / 250ft asl. Rated HG Supervised/PG2. To get to this launch, drive west past the Southside carpark turnoff for about 400 m until you see a dirt turnout with a walking track. Follow the track until you come to a meeting of five tracks. Take the leftmost one to launch. It's a fair way if you're carrying a hang glider. Southside (SE-SSW) 35m / 120ft asl. Rated PG2, recommended PG only. Park at Southside carpark and take the track at the end of the carpark. Setup and launch from the astroturf area only. Due to rotor from the cliff edge, this takeoff can be tricky for hang gliders.\\n\\nLanding: Top land on Southside or land on the beach below. Beware, in a high tide/high surf, this beach can get too small to safely land. Always consider your landing options.\",\"unassignedText\":\"\",\"siteguideVersion\":\"v857\",\"siteguideScrapedAt\":\"2026-05-17T12:15:45.157Z\",\"contentHash\":\"a525f9aa23cb168fa7e244c12db9516fe1cacd1872b4329bf01cc451358987df\",\"temporarilyClosed\":0,\"preClosureOverrideHideClosed\":null,\"isTidal\":\"false\",\"tideStationId\":null,\"skipBulkImport\":\"false\",\"isXCSite\":\"false\",\"launchHeight2\":null,\"landingHeight2\":null,\"heroImages\":\"[]\",\"displayOnMap\":1,\"displayInList\":1}],\"total\":\"74\",\"limit\":3,\"offset\":0,\"hasMore\":true}"