            - paragraph [ref=e28]: "This is a sensitive site. Do not walk through the dunes and do not kite up the dunes. As always, give marked Hooded Plover nest sites plenty of room. Consider flying Ocean Grove or elsewhere instead to reduce traffic at this site. Beach nesting birds: Hooded Plovers nest in this area. Visit this page to learn more. NOTICE - 13th Beach, Barwon Heads - Limited Access Until further notice hang gliding operations at 13th beach are restricted to the 40W location. Addtionally, set up and launching are limited to one aircraft at any time. Top landing at 13th beach is banned except at the launch site at 40W. Negotiations are currently in progress with Barwon Coast, the responsible authority, to develop a substainable facility."
