              - heading "Launch Area" [level=3] [ref=e129]
              - paragraph [ref=e131]: Hang gliders set up and take off on the grass patch left of the access path at the westmost carpark (40W). Paragliders take off from the beach at 32W or 30W. There is no PG top launch.
            - generic [ref=e132]:
              - heading "Landing Zones" [level=3] [ref=e134]
              - paragraph [ref=e136]: Anywhere on the beach. Hang gliders can top land on launch only. If possible, pack up hang gliders on the beach to reduce impact on launch vegetation.
