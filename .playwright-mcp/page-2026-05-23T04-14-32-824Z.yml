    - generic [ref=e462]:
      - generic [ref=e478]:
        - generic [ref=e479]: I'm planning a fly next Friday, I'm PG3 — what sites can I access?
        - img [ref=e480]
      - generic [ref=e495]:
        - img [ref=e496]
        - generic [ref=e499]:
          - generic [ref=e500]: As a PG3 pilot, you are fully qualified to fly sites rated PG3 or lower without supervision. However, for sites rated PG4 or higher, you will require supervision from an appropriate instructor or safety officer.
          - generic [ref=e501]: "Here are the sites you can access next Friday, May 30th, 2026:"
          - strong [ref=e503]: "Sites requiring no supervision (PG3 or lower):"
          - generic [ref=e504]:
            - emphasis
            - emphasis [ref=e505]: Barwon Heads (13th Beach)
            - text: "* ([/sites/barwon-heads-13th-beach]): This coastal site takes S-SW winds at 10-14 knots. Remember to avoid walking or kiting up the dunes and give marked Hooded Plover nest sites plenty of room."
          - generic [ref=e506]:
            - emphasis
            - emphasis [ref=e507]: Bells Beach - Southside
            - text: "* ([/sites/bells-beach]): A popular coastal site for paragliders, suitable for S-E winds at 5-12 knots. Be aware that the beach landing can be small at high tide or high surf."
          - generic [ref=e508]:
            - emphasis
            - emphasis [ref=e509]: Ben More
            - text: "* ([/sites/ben-more]): This large inland ridge is suitable for SW winds at 4-8 knots. Your first flights here must be under supervision of a Western Vic club member to learn site protocols and land access restrictions."
          - generic [ref=e510]:
            - emphasis
            - emphasis [ref=e511]: Gordon
            - text: "* ([/sites/gordon]): Mt Black (Gordon) is a rounded, grassy volcanic hill for S, SE, ESE winds at 5-8 knots. It has an easy open take off and landing."
          - generic [ref=e512]:
            - emphasis
            - emphasis [ref=e513]: Kilcunda
            - text: "* ([/sites/kilcunda]): This coastal dune site is suitable for S-SW winds at 10-14 knots and offers soaring opportunities. The takeoff at the Graveyard is directly above a popular surf fishing spot, so be mindful of people and fishing equipment on the beach when landing."
          - generic [ref=e514]:
            - emphasis
            - emphasis [ref=e515]: Logans Beach
            - text: "* ([/sites/logans-beach]): Scrubby coastal dunes for SSW-SW winds at 8-16 knots. Be aware of whales and associated tourist aircraft during winter months (July-September)."
          - generic [ref=e516]:
            - emphasis
            - emphasis [ref=e517]: Marriners Lookout
            - text: "* ([/sites/marriners-lookout]): A large grassy coastal hill range for SE winds at 5-8 knots. A daily per pilot launch fee of $9.50 is required, and you must sign a waiver form before flying."
          - generic [ref=e518]:
            - emphasis
            - emphasis [ref=e519]: Yarragon
            - text: "* ([/sites/yarragon]): A low rolling grassy hill for N winds at 5-8 knots. It is essential to check the landing area before flying due to power lines. Permission must be obtained from the private landowner of the takeoff land and Mr. John Harvey (the bottom land owner) before flying."
          - strong [ref=e521]: "Sites requiring supervision:"
          - generic [ref=e522]:
            - emphasis
            - emphasis [ref=e523]: Dunvegan Road, Phillip Island
            - text: "* ([/sites/dunvegan-road-phillip-island]): A 50 ft high cliff site for SSW winds at 10-11 knots. As a PG3 pilot, you require PG5 supervision to fly here. Be aware of the single launch area and strictly no top landing."
          - generic [ref=e524]:
            - emphasis
            - emphasis [ref=e525]: Flaxmans Hill
            - text: "* ([/sites/flaxmans-hill]): Scenic coastal cliffs for SW winds at 5-8 knots. As a PG3 pilot, you require PG4 supervision to fly here. Be careful when flying the sheer cliffs in light winds."
          - generic [ref=e526]:
            - emphasis
            - emphasis [ref=e527]: Gundowring (Savhill)
            - text: "* ([/sites/gundowring-savhill]): This inland site has huge potential with reliable valley winds and thermals for NNW, SSW winds at 5-8 knots. As a PG3 pilot, you require PG4/SO supervision to fly here. The access track is only passable for 4WD/AWD vehicles."
          - generic [ref=e528]:
            - emphasis
            - emphasis [ref=e529]: Manny's
            - text: "* ([/sites/manny-s]): A large inland ridge for S-SSW winds at 5-16 knots. As a PG3 pilot, you require PG4/SO supervision to fly here. There is a grumpy eagle resident who may attack paragliders, so please be cautious."
          - generic [ref=e530]:
            - emphasis
            - emphasis [ref=e531]: Murmungee
            - text: "* ([/sites/murmungee]): This inland site offers a ground ramp through a tree slot for SSW winds at 5-16 knots. As a PG3 pilot, you require FI/SSO supervision to fly here. It can be difficult to judge wind strength and direction on launch. The extended forecast for Thursday shows good conditions: 6kts G9 SSW Overcast."
          - generic [ref=e532]:
            - emphasis
            - emphasis [ref=e533]: Mystic
            - text: "* ([/sites/mystic]): Mystic Hill is an excellent inland site for N winds at 5-8 knots. As a PG3 pilot, you require PG4/SO supervision to fly here. Be aware of strong lift in summer and power lines along the road near the landing ground."
          - generic [ref=e534]:
            - emphasis
            - emphasis [ref=e535]: Ocean Grove
            - text: "* ([/sites/ocean-grove]): Coastal sand dunes for S-SSW winds at 10-14 knots. As a PG3 pilot, you require PG4 supervision to fly here. There can be turbulence if the wind is off to the right."
          - generic [ref=e536]:
            - emphasis
            - emphasis [ref=e537]: Spion Kop
            - text: "* ([/sites/spion-kop-fairhaven-aireys-moggs]): Victoria's most popular coastal site for SSW-SSE winds at 9-12 knots. As a PG3 pilot, you require Spion Endorsement supervision to fly here. Students are prohibited, and you must adhere to the notice board at launch."
          - generic [ref=e538]:
            - emphasis
            - emphasis [ref=e539]: Tawonga Gap
            - text: "* ([/sites/tawonga-gap]): A tree slot launch on a large inland ridge for NE winds at 5-8 knots. As a PG3 pilot, you require FI/SSO supervision to fly here. The LZ cannot be seen from launch, and high tension powerlines run along the valley."
          - generic [ref=e540]: For the most up-to-date information and full live weather views, please check each site's dedicated page. Remember to always fly within your capabilities and adhere to all site rules and safety guidelines.
          - strong [ref=e542]: General information only. Consult SAFA/CASA docs and Site Rules.
