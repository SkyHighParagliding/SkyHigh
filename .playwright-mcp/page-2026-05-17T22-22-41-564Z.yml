                - paragraph [ref=e1124]: Ground ramps through tree slots. Toilet facilities at main launch. Please park vehicles back from launch near toilet facilities to help minimise dust. WhatsApp groups for; Corryong / Mt Elliot PG HG Chat. Corryong XC Tracking & Retrieve. This launch site is located in the CTAF area (Common Traffic Advisory Frequency, 126.7) of Corryong Airstrip. When launching you are required to carry a VHF Radio and actively monitor the CTAF. You are also required to transmit, especially when you consider it reasonably necessary to avoid the risk of collision with another aircraft. During fire season Corryong airstrip is used frequently by fire fighting aircraft 24/7. Recreation flying is to avoid conflict with emergency service aircraft at all times. Hancock Victoria Plantations use Ch-25 & CH-26 around Mt Elliot & Bright. Avoid using these channels especially on Tone Squelch. Regularly the location of the Corryong Cup and Victorian open. This mountain flying is the best around, especially in the later season. 9000' agl is not uncommon. The valley system makes the flying spectacular and the retrieves easy and quick. Extensive cross country possibilities are possible to the N, W, and S.
