                - paragraph [ref=e673]: "Paraglider and Hang Glider. NNE facing takeoff tree slot launch, wide enough for a single glider, new astroturf has been installed in May 2024 which gives a wider and cleaner launch area. The following is strictly a guide, pilots must appreciate that turbulence increases exponentially as the wind strength increases. 18 knots is said to be the limit for hangies, less for PGs at about 10 knots. There will be a band of rotor to go through at about 130ft above, this should subside at about 80ft to 70ft, but be careful & ready. From the air you must assess the current conditions and choose the sweet spot. If uncertain, take the less convenient but conservative (SAFE) option and choose one of the bottom landing areas. The club recommends that you have these skills / experience before flying this site: Suitable Mountain xc experience. The judgment & skills to read the conditions and fly if safe to do so Confident with forward launching in nil or cross wind First flight - Supervised (onsite) by an experienced pilot with current local experience."
