                    - text: S-SW
                - paragraph [ref=e1519]: "The site is within the Mornington Peninsula National Park so pilots should respect and enjoy the environment. Most importantly that means take-off cleanly from the ramp, land on the beach and return via the main access track. NO scrambling up and down the cliffs or dunes! Stay out of the sand dunes completely to protect their structure and to protect the birds and animals that live there. This means that flying operations of launching and landing are to be confined to the launch area, the beach and the interconnecting ramp. All of the beach may be used for landing and part, but not all, of the beach can be used for ground handling practice as well. However, launching from the beach at Portsea is not permitted. The beach area where ground handling is NOT permitted runs between the beach access ramp and a point 200 m west of the access ramp - see map. Beach nesting birds: Hooded Plovers nest in this area. Visit this page to learn more."
