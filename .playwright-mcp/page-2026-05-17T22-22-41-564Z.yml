                - paragraph [ref=e1402]: Mystic Hill is an excellent site which often works because it faces the valley wind and generates some strong thermals. It is located 2km south of Bright just off the road to Wandiligong. Mystic is one of the most popular Victorian inland sites, which has hosted numerous state and national competitions as well as the the Paragliding World Cup in 1998 and most recently, 2018. Current weather observations can be accessed via the Mystic weather station. Financial Membership with the NEVHGC is required before flying Mystic, and can only be purchased from the club website at www.nevhgc.net using a PayPal account or credit card. Links to social media groups can be found on the club website, otherwise most pilots meet at the LZ on Morses Creek Road to car-pool up the hill. From December 2019 restrictions have been introduced to reduce traffic on the access road to Mystic launch. NEVHGC members are still given free access for the purpose of flying and vehicle retrieve but will not be admitted if there are bikes in the vehicles. Access to launch is only via the principal Mystic Lane entry. All other access tracks have been closed off. Eagle Attacks – most wedgetail eagles in the area are friendly, however there is a grumpy eagle resident on the Buffalo Foothills who may attack paragliders. Please see Site Page>Hazards for details. For accomodation there are many options available in Bright, ranging from backpackers hostels, to caravan parks and luxury cottages. Camp Crusty (with cabins and camping) is the closest option to the landing zone of Mystic.
