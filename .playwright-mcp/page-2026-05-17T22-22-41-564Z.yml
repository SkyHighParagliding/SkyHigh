                - paragraph [ref=e1000]: "Mt Buffalo is a large granite mountain. Reed’s lookout PG launch comprises a series of large (3-4m) boulders with a surface slope of around 35-40deg off level and deep fissures between the boulders. The surface is of ‘sharp’ granite which is helpfully non-slip but can grab lines and cause wing damage if movement against the rock face is excessive. Several options for launch are available: the conditions will indicate the optimum. The drop-off in front of the boulders is sheer where it is not closed by low trees thus there is no room for error. The site is rated PG5. PG4 may only launch under FI/SSO supervision. Visitors are strongly advised to seek local knowledge before attempting to fly here. Eagle Attacks – most wedgetail eagles in the area are friendly, however there is a grumpy eagle resident on the Buffalo Foothills who may attack paragliders. Please see Site Page>Hazards for details. Cross country options are wide. Once you have climbed out there are options to reach in all directions. Before going XC, please check the siteguide for allowed and forbidden landing paddocks in the area and endeavour always to land in a Blue Zone."
                - generic [ref=e1001]:
