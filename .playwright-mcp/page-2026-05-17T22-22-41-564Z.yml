                    - text: N,NE
                - paragraph [ref=e1764]: Werribee Gorge is renowned for two things - never being on, and being very rough. Most people do not go to the Gorge unless it is really lousy elsewhere, so it is usually lousy at the Gorge too. The ridge is used extensively by sailplanes from the Bacchus Marsh Gliding Club whenever a brisk Northerly is blowing. Thermals cook up from the sheltered valley. The site overlooks the flood plains of the Werribee river, but is unfortunately downwind of several rather rough looking hills on the other side, hence the rough air, which has to go down before it gets a chance to go up. Werribee Gorge is best flown early in the morning, on days when the forecast is Northerly, increasing to 10 - 15kts. You should launch no later than 11.00am, because at lunchtime the Green breeze sets in. The Green Breeze is a pseudo sea breeze from the SW generated by extensive treed areas. The wind will switch to SW in the space of 10 minutes, to a strength of up to 15kts. Best flights are acheived in a firm NE with lots of Cu. In a N, NNE getting away will see you travelling down the Bachus Marsh - Geelong Rd. You can follow the eastern edge of the Brisbane ranges all the way to Geelong.
                - generic [ref=e1765]:
