                    - text: E,ESE,SE
                - paragraph [ref=e580]: This site has been recently reopened and use is now subject to a license granted by the Mornington Peninsula Shire, with continuation subject to our compliance with the conditions of use below. Please help us hold onto this site by assuring all operations are conducted safely and in accordance with the license conditions which are summarized below. In addition, please be aware that we operate in close proximity to the first and second world war memorials managed by the Flinders RSL, and due respect should be paid at all times to these important monuments. The Monument site offers excellent lift in any soarable E-ESE wind. The best flying is generally in October/November when there are usually lots of easterlies or in March. Good winds also occur perhaps once or twice a week up until April. In light winds the site is generally flyable from just south of takeoff to where the cliff peters out about 500m to the left, but in any reasonable wind, you can cross to Boyds Point to the north. In excellent winds, it is possible to fly all the way to Shoreham/Point Leo and if the wind is East and about 15 knots, high performance gliders can usually make the return trip from Shoreham. It can sometimes be very difficult to get up in light conditions. In fact, in very light conditions it can seem soarable, but there appears to be some form of block which destroys lift below cliff level at the sheer cliff end to the north. The boats anchored by the pier in front of the site offer a good indicator of wind direction.
