                - paragraph [ref=e549]: A ground ramp and a good set up area. The Flinders area has proven to be a very popular, versatile paragliding and hang gliding venue. The golf course take off area and recovery steps make it that much safer and easier. In consistent southerly lift, pilots can enjoy a trip up the coast to the point before the Blow hole, about 1.6km away to the west and to the Gunnery boundary on the low slopes to the left of the bowl. In excellent Southerly conditions, it is possible to cross the Blowhole and fly to Cairns Bay and return. You are advised to take a vario. In summer quite bouyant bubbles of air can lift from exposed rock areas on the beach and this can result in additional heights of several hundred feet. In exceptional post-frontal conditions, higher performance gliders can work cloud suck from parcels of moist air passing over the coastline with gains of 1000 to 2000ft possible by circling back under the clouds and over the town.
                - generic [ref=e550]:
