                - paragraph [ref=e394]: Site endorsement is required for paragliders pilots and authorisation by a PG5 (endorsed), or FI/CFI/SSO. The name and SAFA numbers of the applicant and authorised endorser will be required. Please complete the observations onsite with the authorised endorser. The main beat for paragliders is the coastline to the right of launch along the cliffs of Birdrock beach and beyond. After Dava beach the pilot needs to carefully evaluate flying conditions and landing options. In favourable conditions it’s also possible to soar the cliffs to the left of launch, but if conditions change it may not be possible to reach a safe landing. Pilots have been caught out this way more than once. Keep an eye on the wind lines. In general, the winds on the bay tend more southerly with time. You should be able to see a southerly swing coming and make it to the appropriate landing area before it gets to you.
