                    - text: SSW-SSE
                - paragraph [ref=e1640]: "Spion Kop is Victoria's most popular coastal site and very beginner-friendly. Given the right conditions it is possible to cross a large gap and fly to the larger hills to the west - more difficult for paragliders but nearly always possible for high-performance HGs. You can also fly the low 20' primary dunes at the base towards the Aireys Inlet lighthouse. As of Dec 2019, there are new rules that apply for flying anywhere along the Spion Kop, Eastern View, Fairhaven and Moggs Creek area. A notice board issued by GORCC will be displayed at the Spion Kop launch. This will give information on the location of the Hooded Plovers and general advice and requests. This will be updated daily or as necessary by GORCC and must be strictly adhered to. If you intend to fly you must first check the new notice board at Spion Kop. If you intend to beach launch from Mad Max, you must first check the notice board at Spion Kop. Under no circumstances are you to enter the dunes or launch backing up the dunes. Hefty fines apply. If it's too light to beach launch then launch from Spion Kop. Gain at least 100ft and cross over plover areas and fly away. There is 6 kilometres of coast to play on so there is no excuse to fly anywhere near them. Familiarize yourself with our Hooded Plover rules. Beach nesting birds: Hooded Plovers nest in this area. Visit this page to learn more. Pilots are required to be Spion endorsed to fly this site (including when launching at Mad Max). You can complete the Spion site specific induction with any authorised officer of the Dynasoarers. Just give them a call."
