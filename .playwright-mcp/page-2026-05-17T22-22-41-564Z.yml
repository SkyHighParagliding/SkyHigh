                - paragraph [ref=e845]: Locksley Field (YLCS) is located 33km north of Seymour on the Hume highway. Freedom Airsports maintain two dragonfly tugs available for towing endorsed HG pilots on most weekends. Contact Peter Holloway and get put on the notification list. Aerotow endorsements can be arranged if you need one. The strip is almost 2km long & 100m wide, ground towing is also sometimes conducted, contact MHGC/FA if you wish to ground tow. The usual plan of action for each day of operations is for training and aerotow endorsements to occur in the early mornings & late afternoons with general tows from midday(ish) onwards. Long distance XC flights, and triangles are often completed. A good road system with many townships in the area , enabling easy pickups for those not able or wishing to return to the field. The area is mostly flat farmland to the W,N & S with hill country to the E. The Melbourne Hang Gliding Club often has fly-ins and club competitions throughout the year here. There are camping, cooking facilities and shower blocks on site, additionally the township of Avenel has pubs and roadhouse eateries.
