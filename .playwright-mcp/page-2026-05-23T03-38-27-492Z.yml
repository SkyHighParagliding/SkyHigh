    - generic [ref=e463]:
      - generic [ref=e480]:
        - generic [ref=e481]: I'm a PG2 pilot, what sites can I fly?
        - img [ref=e482]
      - generic [ref=e485]:
        - img [ref=e486]
        - generic [ref=e489]:
          - generic [ref=e490]: Hello! As a PG2 Supervised pilot, you require on-site supervision by an Instructor, Safety Officer, Duty Pilot, or supervising pilot (PG4 or Intermediate HG pilot with a minimum of 50 hours flight experience, PG5 or Advanced HG) at every site, without exception. All operations must be conducted in the presence of your supervising pilot.
          - generic [ref=e491]: "Here are the sites you can fly, always with the required supervision:"
          - generic [ref=e492]:
            - text: "*"
            - link "Barwon Heads (13th Beach)" [ref=e493] [cursor=pointer]:
              - /url: /sites/barwon-heads-13th-beach
            - text: ": This is a sensitive coastal site, and you must not walk or kite up the dunes. Give marked Hooded Plover nest sites plenty of room."
          - generic [ref=e494]:
            - text: "*"
            - link "Bells Beach - Southside" [ref=e495] [cursor=pointer]:
              - /url: /sites/bells-beach
            - text: ": A popular coastal site. Be aware that the beach landing area can be small at high tide or high surf."
          - generic [ref=e496]:
            - text: "*"
            - link "Ben More" [ref=e497] [cursor=pointer]:
              - /url: /sites/ben-more
            - text: ": This is a large inland ridge. For your first flights here, you must be under the supervision of a Western Vic club member to learn site protocols, prohibited landings, and other land access restrictions."
          - generic [ref=e498]:
            - text: "*"
            - link "Flaxmans Hill" [ref=e499] [cursor=pointer]:
              - /url: /sites/flaxmans-hill
            - text: ": This scenic coastal cliff site allows PG2 pilots with PG4 supervision. There are no beach landings to the east past the first bay, and you should not fly the sheer cliffs if the wind is light or likely to drop off."
          - generic [ref=e500]:
            - text: "*"
            - link "Flinders Golf Club" [ref=e501] [cursor=pointer]:
              - /url: /sites/flinders-golf-club
            - text: ": You can fly here with PG4/SO supervision. Note that when the wind is SW or SE, there can be turbulence. Beach landing only; use the road, not the footpath, to return from the beach."
          - generic [ref=e502]:
            - text: "*"
            - link "Gordon" [ref=e503] [cursor=pointer]:
              - /url: /sites/gordon
            - text: ": This is a rounded, grassy volcanic hill. Keep a lookout for light aircraft flying between Melbourne and Ballarat, and be aware that the access paddock is sometimes ploughed."
          - generic [ref=e504]:
            - text: "*"
            - link "Gundowring (Savhill)" [ref=e505] [cursor=pointer]:
              - /url: /sites/gundowring-savhill
            - text: ": This site offers huge potential with reliable valley winds and thermals. PG2 pilots require PG4/SO supervision. Access is 4WD/AWD only."
          - generic [ref=e506]:
            - text: "*"
            - link "Kilcunda" [ref=e507] [cursor=pointer]:
              - /url: /sites/kilcunda
            - text: ": This coastal dune site is suitable for student-rated pilots and above. Be aware of people and fishing equipment on the beach when landing, as the takeoff is directly above a popular surf fishing spot."
          - generic [ref=e508]:
            - text: "*"
            - link "Logans Beach" [ref=e509] [cursor=pointer]:
              - /url: /sites/logans-beach
            - text: ": These are scrubby coastal dunes. Be aware of whales and tourist aircraft during winter (July through September)."
          - generic [ref=e510]:
            - text: "*"
            - link "Manny's" [ref=e511] [cursor=pointer]:
              - /url: /sites/manny-s
            - text: ": This large inland ridge is flyable for PG2 pilots with PG4/SO supervision. There is a grumpy eagle that may attack paragliders, and the site is a tree slot, so do not launch in light or cross winds. Text Manny (0427 271 318) before using the launch or landing."
          - generic [ref=e512]:
            - text: "*"
            - link "Marriners Lookout" [ref=e513] [cursor=pointer]:
              - /url: /sites/marriners-lookout
            - text: ": A large grassy coastal hill range. A daily per-pilot launch fee of $9.50 is required, and you must sign a waiver form. Beware of powerlines, fences, gullies, and snakes on the pathway."
          - generic [ref=e514]:
            - text: "*"
            - link "Murmungee" [ref=e515] [cursor=pointer]:
              - /url: /sites/murmungee
            - text: ": PG2 pilots require FI/SSO supervision here. It is difficult to judge wind strength and direction on launch due to its sheltered nature."
          - generic [ref=e516]:
            - text: "*"
            - link "Mystic" [ref=e517] [cursor=pointer]:
              - /url: /sites/mystic
            - text: ": This excellent inland site is available for PG2 pilots with PG4/SO supervision. Be aware of strong lift in summer, power lines along the road beside the landing ground, and large expanses of 'tiger' country to the south."
          - generic [ref=e518]:
            - text: "*"
            - link "Portsea" [ref=e519] [cursor=pointer]:
              - /url: /sites/portsea
            - text: ": Located within the Mornington Peninsula National Park. When flying below the point to the left of takeoff, be wary of the slight rotor. Land on the beach and return via the main access track; no scrambling in the dunes."
          - generic [ref=e520]:
            - text: "*"
            - link "Spion Kop" [ref=e521] [cursor=pointer]:
              - /url: /sites/spion-kop-fairhaven-aireys-moggs
            - text: ": Victoria's most popular coastal site and very beginner-friendly for PG2 pilots, though Spion Endorsement is required. The beach can be very small at high tide. Students are prohibited."
          - generic [ref=e522]:
            - text: "*"
            - link "Yarragon" [ref=e523] [cursor=pointer]:
              - /url: /sites/yarragon
            - text: ": This is a low rolling grassy hill. There are two power lines running through the landing paddock, one in the middle and a second along the road. Permission must be obtained from the private landowner of the takeoff land and Mr. John Harvey (the bottom landowner) before flying."
          - generic [ref=e524]: For the most up-to-date information and to verify conditions, always check the individual site pages. Remember, safety first! You can find the full details on these sites by clicking on their names.
          - strong [ref=e526]: General information only. Consult SAFA/CASA docs and Site Rules.
